name: Bug report
description: Report a defect or regression
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: error_context
    attributes:
      label: Error / Context
      description: Include logs or stack traces if available
      render: shell
  - type: input
    id: location
    attributes:
      label: Location
      description: Files, routes, or components
      placeholder: app/admin_api/routers/orders.py#L620
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
  - type: input
    id: environment
    attributes:
      label: Environment
      description: prod/staging/local + version or tag