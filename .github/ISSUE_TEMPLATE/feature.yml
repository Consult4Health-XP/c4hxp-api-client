name: Feature request
description: Propose a new feature or enhancement
title: "[Feature]: "
labels: ["feature", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the request?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / Goal
      description: Why does this matter? What outcome are we driving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Rough approach, UX, or technical plan
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ]
        - [ ]
  - type: textarea
    id: risks
    attributes:
      label: Risks / Dependencies
      description: External dependencies, integrations, or risks